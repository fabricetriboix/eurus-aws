name: Terragrunt destroy unit
description: Preview or destroy a single feature in a Terragrunt environment stack

inputs:
  environment:
    description: "Name of the environment, eg: `common-nonprod`"
    required: true
  feature:
    description: "Feature name (eg: `grafana`)"
    required: true
  role-arn:
    description: "ARN of the role to assume"
    required: true
  aws-region:
    description: "AWS region where the component is deployed"
    required: true
  action:
    description: "'plan' runs `tofu plan -destroy`; 'destroy' runs `tofu destroy`"
    required: true
    default: plan

runs:
  using: composite
  steps:
  - name: Install OpenTofu and Terragrunt
    uses: gruntwork-io/terragrunt-action@v3

  - name: Print Terragrunt and OpenTofu versions
    shell: bash
    run: |
      echo "Terragrunt version: $(terragrunt version)"
      echo "OpenTofu version: $(tofu version)"

  - name: Ensure TF cache folder exists
    shell: bash
    run: mkdir -p /tmp/tf-cache

  - name: Restore or create the TF cache
    uses: actions/cache@v5
    with:
      path: /tmp/tf-cache
      key: ${{ runner.os }}-tf-env-${{ inputs.environment }}-${{ inputs.feature }}
      restore-keys: |
        ${{ runner.os }}-tf-env-${{ inputs.environment }}
        ${{ runner.os }}-tf-env-

  - name: Assume role in child account
    shell: bash
    env:
      AWS_REGION: ${{ inputs.aws-region }}
    run: |
      creds=$(aws sts assume-role --role-arn "${{ inputs.role-arn }}" --role-session-name tg-destroy-unit)
      echo "AWS_ACCESS_KEY_ID=$(echo "$creds" | jq -r '.Credentials.AccessKeyId')" >> $GITHUB_ENV
      echo "AWS_SECRET_ACCESS_KEY=$(echo "$creds" | jq -r '.Credentials.SecretAccessKey')" >> $GITHUB_ENV
      echo "AWS_SESSION_TOKEN=$(echo "$creds" | jq -r '.Credentials.SessionToken')" >> $GITHUB_ENV
      echo "AWS_REGION=${{ inputs.aws-region }}" >> $GITHUB_ENV

  - name: Validate stack unit exists
    shell: bash
    env:
      ENV: ${{ inputs.environment }}
      FEATURE: ${{ inputs.feature }}
    run: |
      set -euo pipefail
      STACK_PATH="feature-${FEATURE}"
      cd "env/${ENV}"
      export TF_INPUT=0
      terragrunt stack generate
      test -d ".terragrunt-stack/${STACK_PATH}" || {
        echo "Stack unit '${STACK_PATH}' not found. Is feature '${FEATURE}' still defined in terragrunt.stack.hcl?"
        exit 1
      }

  - name: Run destroy job
    shell: bash
    env:
      TF_PLUGIN_CACHE_DIR: /tmp/tf-cache
      AWS_REGION: ${{ inputs.aws-region }}
      TG_NON_INTERACTIVE: "true"
    run: |
      set -euo pipefail
      if [ "${{ inputs.action }}" = "plan" ]; then
        make plan-destroy-env-unit-${{ inputs.environment }} STACK_UNIT=${{ inputs.feature }} CHECKOV=0
      else
        make destroy-env-unit-${{ inputs.environment }} STACK_UNIT=${{ inputs.feature }} CHECKOV=0
      fi
