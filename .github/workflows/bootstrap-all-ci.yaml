name: OpenTofu CI - bootstrap/all

on:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    branches:
    - main
    paths:
    - bootstrap/all/**
    - .github/workflows/bootstrap-all-ci.yaml
    - .github/actions/tf-ci/**
    - Makefile

permissions:
  id-token: write         # This is required for requesting the JWT
  contents: read          # This is required for actions/checkout
  security-events: write  # For `github/codeql-action/upload-sarif` to upload SARIF results

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: bootstrap

    steps:
    - name: Checkout the code
      uses: actions/checkout@v5

    # NB: Running `make ci-bootstrap-all` requires AWS access to the management account
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::${{ vars.AWS_MANAGEMENT_ACCOUNT_ID }}:role/github-actions-role
        role-session-name: github-actions
        aws-region: ${{ vars.AWS_REGION }}

    - name: Run CI
      uses: ./.github/actions/tf-ci
      with:
        component-type: bootstrap
        component-name: all
