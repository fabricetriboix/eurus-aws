name: OpenTofu CI - bootstrap/all

on:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    branches:
    - main
    paths:
    - bootstrap/all/**
    - .github/workflows/bootstrap-all-ci.yaml
    - .github/actions/tg-ci/**
    - Makefile

permissions:
  contents: read
  security-events: write  # For `github/codeql-action/upload-sarif` to upload SARIF results

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: bootstrap

    steps:
    - name: Checkout the code
      uses: actions/checkout@v5

    - name: Install OpenTofu and Terragrunt
      uses: gruntwork-io/terragrunt-action@v3

    - name: Print Terragrunt and OpenTofu versions
      shell: bash
      run: |
        echo "Terragrunt version: $(terragrunt version)"
        echo "OpenTofu version: $(tofu version)"

    - name: Ensure TF cache folder exists
      shell: bash
      run: mkdir -p /tmp/tf-cache

    - name: Restore or create the TF cache
      uses: actions/cache@v4
      with:
        path: /tmp/tf-cache
        key: ${{ runner.os }}-tf-${{ inputs.component-type }}-${{ inputs.component-name }}
        restore-keys: |
          ${{ runner.os }}-tf-${{ inputs.component-type }}
          ${{ runner.os }}-tf-

    - name: Run CI job
      shell: bash
      env:
        TF_PLUGIN_CACHE_DIR: /tmp/tf-cache
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: |
        make ci-bootstrap-all CHECKOV=0

    - name: Run Checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: ./bootstrap/all
        quiet: true
        output_format: cli,sarif
        output_file_path: console,results.sarif

    - name: Upload Checkov SARIF file
      uses: github/codeql-action/upload-sarif@v4
      # Results are generated only on a success or failure
      # this is required since GitHub by default won't run the next step
      # when the previous one has failed. Security checks that do not pass will 'fail'.
      # An alternative is to add `continue-on-error: true` to the previous step
      # Or 'soft_fail: true' to checkov.
      if: success() || failure()
      with:
        sarif_file: results.sarif
