name: OpenTofu CI - bootstrap/all

on:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    branches:
    - main
    paths:
    - bootstrap/all/**
    - .github/workflows/bootstrap-all-ci.yaml
    - .github/actions/tg-ci/**
    - Makefile

permissions:
  contents: read
  security-events: write  # For `github/codeql-action/upload-sarif` to upload SARIF results

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: bootstrap

    steps:
    - name: Checkout the code
      uses: actions/checkout@v5

    - name: Run CI
      uses: ./.github/actions/tg-ci
      with:
        component-type: bootstrap
        component-name: all
        role-arn: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-role"
        aws-region: ${{ vars.AWS_REGION }}
