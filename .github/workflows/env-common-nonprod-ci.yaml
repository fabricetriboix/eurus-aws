name: OpenTofu CI - env/common-nonprod

on:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    branches:
    - main
    paths:
    - env/common-nonprod/**
    - .github/workflows/env-common-nonprod-ci.yaml
    - .github/actions/tg-ci/**
    - Makefile

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout
  security-events: write  # For `github/codeql-action/upload-sarif` to upload SARIF results

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v5

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: arn:aws:iam::${{ secrets.COMMON_NONPROD_ACCOUNT_ID }}:role/tf-role-eu-west-1
        role-session-name: github-actions
        aws-region: eu-west-1

    - name: STS get caller identity
      shell: bash
      run: |
        aws sts get-caller-identity

    - name: Run CI
      uses: ./.github/actions/tg-ci
      with:
        component-type: env
        component-name: common-nonprod
