name: ++ OpenTofu CD - On-demand deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy; eg: `common-nonprod`"
        required: true
        type: choice
        options:
        - common-nonprod
        - dev
      action:
        description: "Action to run; must be either `apply` or `destroy`"
        required: true
        type: choice
        default: apply
        options:
        - apply
        - destroy

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

concurrency:
  group: env-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  cd:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
    - name: Checkout the code
      uses: actions/checkout@v5

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::${{ vars.AWS_MANAGEMENT_ACCOUNT_ID }}:role/github-actions-role
        role-session-name: github-actions
        aws-region: ${{ vars.AWS_REGION }}

    - name: Run CD
      uses: ./.github/actions/tg-cd
      with:
        component-type: env
        component-name: ${{ inputs.environment }}
        role-arn: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/tf-role-${{ vars.AWS_REGION }}"
        aws-region: ${{ vars.AWS_REGION }}
        action: ${{ inputs.action }}
