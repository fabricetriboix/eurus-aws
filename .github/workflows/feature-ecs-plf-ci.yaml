name: OpenTofu CI - feature/ecs-plf

on:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    branches:
    - main
    paths:
    - feature/ecs-plf/**
    - .github/workflows/feature-ecs-plf-ci.yaml
    - .github/actions/tf-ci/**
    - Makefile

permissions:
  contents: read
  security-events: write  # For `github/codeql-action/upload-sarif` to upload SARIF results

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v5

    - name: Run CI
      uses: ./.github/actions/tf-ci
      with:
        component-type: feature
        component-name: ecs-plf
