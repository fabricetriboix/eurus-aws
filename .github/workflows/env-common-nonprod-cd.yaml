name: OpenTofu CD - env/common-nonprod

on:
  push:
    branches:
    - main
    paths:
    - env/common-nonprod/**
    - .github/workflows/env-common-nonprod-cd.yaml
    - .github/actions/tg-cd/**
    - Makefile

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: common-nonprod

    steps:
    - name: Checkout the code
      uses: actions/checkout@v5

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::${{ vars.AWS_MANAGEMENT_ACCOUNT_ID }}:role/github-actions-role
        role-session-name: github-actions
        aws-region: ${{ vars.AWS_REGION }}

    - name: Run CD
      uses: ./.github/actions/tg-cd
      with:
        component-type: env
        component-name: common-nonprod
        role-arn: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/tf-role-${{ vars.AWS_REGION }}"
        aws-region: ${{ vars.AWS_REGION }}
        action: apply
